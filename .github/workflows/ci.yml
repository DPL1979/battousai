name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Verify zero dependencies
        run: |
          python -c "import battousai; print(f'Battousai v{battousai.__version__} loaded successfully')"
          echo "No pip install needed — zero external dependencies"

      - name: Run test suite
        run: |
          python -m unittest discover -s tests -v 2>&1

      - name: Run security benchmark
        run: |
          python examples/security_benchmark.py

      - name: Run demo
        run: |
          timeout 30 python examples/demo.py || true

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check type hints (basic)
        run: |
          python -c "
          import ast, sys, pathlib
          errors = 0
          for f in pathlib.Path('battousai').glob('*.py'):
              try:
                  ast.parse(f.read_text())
              except SyntaxError as e:
                  print(f'Syntax error in {f}: {e}')
                  errors += 1
          print(f'Parsed {len(list(pathlib.Path(\"battousai\").glob(\"*.py\")))} modules, {errors} errors')
          sys.exit(errors)
          "

      - name: Check no external imports
        run: |
          python -c "
          import ast, sys, pathlib
          
          STDLIB = {
              'abc', 'ast', 'asyncio', 'base64', 'binascii', 'bisect', 'builtins',
              'calendar', 'cgi', 'cmd', 'codecs', 'collections', 'colorsys',
              'concurrent', 'configparser', 'contextlib', 'copy', 'csv', 'ctypes',
              'dataclasses', 'datetime', 'decimal', 'difflib', 'dis', 'email',
              'enum', 'errno', 'fcntl', 'filecmp', 'fnmatch', 'fractions',
              'functools', 'gc', 'getopt', 'getpass', 'glob', 'grp', 'gzip',
              'hashlib', 'heapq', 'hmac', 'html', 'http', 'importlib', 'inspect',
              'io', 'ipaddress', 'itertools', 'json', 'keyword', 'linecache',
              'locale', 'logging', 'lzma', 'math', 'mimetypes', 'mmap',
              'multiprocessing', 'numbers', 'operator', 'os', 'pathlib',
              'pickle', 'platform', 'pprint', 'profile', 'pwd', 'queue',
              'random', 're', 'readline', 'reprlib', 'resource', 'secrets',
              'select', 'selectors', 'shelve', 'shlex', 'shutil', 'signal',
              'site', 'socket', 'socketserver', 'sqlite3', 'ssl', 'stat',
              'statistics', 'string', 'struct', 'subprocess', 'symtable', 'sys',
              'sysconfig', 'tempfile', 'textwrap', 'threading', 'time',
              'timeit', 'token', 'tokenize', 'trace', 'traceback', 'tracemalloc',
              'tty', 'turtle', 'types', 'typing', 'unicodedata', 'unittest',
              'urllib', 'uuid', 'venv', 'warnings', 'weakref', 'xml', 'xmlrpc',
              'zipfile', 'zipimport', 'zlib',
              '__future__', '_thread',
          }
          INTERNAL = {'battousai'}
          
          violations = []
          for f in pathlib.Path('battousai').glob('*.py'):
              tree = ast.parse(f.read_text())
              for node in ast.walk(tree):
                  if isinstance(node, ast.Import):
                      for alias in node.names:
                          root = alias.name.split('.')[0]
                          if root not in STDLIB and root not in INTERNAL:
                              violations.append(f'{f}:{node.lineno} imports {alias.name}')
                  elif isinstance(node, ast.ImportFrom) and node.module:
                      root = node.module.split('.')[0]
                      if root not in STDLIB and root not in INTERNAL:
                          violations.append(f'{f}:{node.lineno} imports from {node.module}')
          
          if violations:
              print('ZERO-DEPENDENCY VIOLATION:')
              for v in violations:
                  print(f'  {v}')
              sys.exit(1)
          else:
              print('All imports are stdlib or internal. Zero-dependency constraint satisfied.')
          "
